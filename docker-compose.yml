services:
  php:
    build: .
    container_name: lab8_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    expose:
      - "9000"

  nginx:
    image: nginx:alpine
    container_name: lab8_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
